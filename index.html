<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friday Lizard Question 🦎</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff0f5, #fef9ff);
    overflow: hidden;
}

/* TOP GIF */
.top-gif {
    display: flex;
    justify-content: center;
    margin-top: 10px;
}

.top-gif img {
    width: 220px;
}

/* MAIN */
.container {
    text-align: center;
    margin-top: 20px;
}

h1 {
    color: #d94f8c;
}

/* BUTTON AREA */
.area {
    position: relative;
    width: 100vw;
    height: 300px;
}

/* YES */
#yesBtn {
    position: absolute;
    left: 30%;
    top: 40%;
    padding: 15px 30px;
    border-radius: 999px;
    border: none;
    background: #4CAF50;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* NO */
#noBtn {
    position: absolute;
    left: 60%;
    top: 40%;
    padding: 15px 30px;
    border-radius: 999px;
    border: none;
    background: #ff5c5c;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}

/* crawling lizards */
.lizard {
    position: absolute;
    font-size: 30px;
    animation: crawl 10s linear infinite;
}

@keyframes crawl {
    0% { transform: translateX(-100px); }
    100% { transform: translateX(110vw); }
}

/* SUCCESS SCREEN */
.success {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, #fff0f5, #fef9ff);
    padding: 20px;
}
</style>
</head>

<body>

<!-- TOP GIF -->
<div class="top-gif">
    <img src="https://media.tenor.com/9V9aZ7x0QWkAAAAC/yes-gif.gif">
</div>

<div class="container">

    <h1>Will you go out with me this Friday? 🦎</h1>

    <!-- MAIN GIF -->
    <img src="https://makeagif.com/gif/lizard-hitting-button-U9O84Q"
         style="width:250px;margin-bottom:20px;">

    <div class="area">
        <button id="yesBtn">😊 Yes</button>
        <button id="noBtn">😢 No</button>
    </div>

</div>

<!-- crawling lizards -->
<div class="lizard" style="top:10%">🦎</div>
<div class="lizard" style="top:50%; animation-delay:2s;">🦎</div>
<div class="lizard" style="top:80%; animation-delay:4s;">🦎</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let index = 0;

const noTexts = [
    "😢 No",
    "Really??",
    "You can't catch me",
    "Try again",
    "Almost there",
    "Sike",
    "Can't say no to an elderly"
];

const yesTexts = [
    "😊 Yes",
    "👀 Look here",
    "psst over here",
    "🦎 Lizard still here",
    "🥺 just say yess"
];

function moveNo() {

    const padding = 80;

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const x = Math.max(padding, Math.random() * maxX);
    const y = Math.max(padding, Math.random() * maxY);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    index++;

    noBtn.textContent = noTexts[index % noTexts.length];
    yesBtn.textContent = yesTexts[index % yesTexts.length];
}

/* hover makes No run away */
noBtn.addEventListener("mouseover", moveNo);

noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNo();
});

/* YES SUCCESS */
yesBtn.addEventListener("click", () => {

    document.body.innerHTML = `
        <div class="success">

            <h1>🦎 no changing mind now</h1>

            <p style="font-size:22px;">
                see you this Friday at 7pm in Rustic<br><br>

                I can pick you up if you like<br>
                or if you want to change the time, I'm nothing if not flexible 😉
            </p>

            <img src="https://media.tenor.com/3bTxZ4Hd5hAAAAAi/cat-cute.gif" width="200">

        </div>
    `;
});

</script>

</body>
</html>
