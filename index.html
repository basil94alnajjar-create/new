<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friday Date?</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffe4ec, #fff5f7);
    font-family: Arial, sans-serif;
}

.container {
    text-align: center;
}

h1 {
    color: #ff4d8d;
}

.cat {
    width: 220px;
    margin-bottom: 15px;
}

.buttons {
    position: relative;
    width: 100vw;
    height: 300px;
}

/* YES */
#yesBtn {
    position: absolute;
    left: 35%;
    top: 40%;
    padding: 15px 30px;
    border-radius: 50px;
    border: none;
    background: #4CAF50;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* NO */
#noBtn {
    position: absolute;
    left: 55%;
    top: 40%;
    padding: 15px 30px;
    border-radius: 50px;
    border: none;
    background: #ff5c5c;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}

</style>
</head>

<body>

<div class="container">

    <!-- SAFE WORKING GIF -->
    <img class="cat"
        src="https://media.tenor.com/3bTxZ4Hd5hAAAAAi/cat-cute.gif"
        alt="cat">

    <h1>Will you go out with me this Friday? 🐱</h1>

    <div class="buttons">
        <button id="yesBtn">😊 Yes</button>
        <button id="noBtn">😢 No</button>
    </div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let noTexts = [
    "😢 No",
    "🙀 Nope",
    "🐱 Try again",
    "😹 Can't catch me",
    "🙈 Almost",
    "🐾 Nice try"
];

let index = 0;

function moveNo() {

    const padding = 80;

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    // FORCE SAFE AREA (prevents going off-screen)
    x = Math.max(padding, Math.min(x, maxX));
    y = Math.max(padding, Math.min(y, maxY));

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    noBtn.textContent = noTexts[index % noTexts.length];
    index++;
}

/* IMPORTANT: use mouseover (better than hover bugs) */
noBtn.addEventListener("mouseover", moveNo);

/* mobile support */
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNo();
});

/* YES button */
yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #ffe4ec, #fff5f7);
            text-align:center;
        ">
            <img src="https://media.tenor.com/3bTxZ4Hd5hAAAAAi/cat-cute.gif" width="180">
            <h1 style="color:#ff4d8d;">YAAAY 🐱</h1>
            <p>See you Friday ✨</p>

            <!-- SAFE DITTO GIF -->
            <img src="https://media.tenor.com/8bQw6v9Q9rAAAAAC/ditto-dance.gif"
                 width="200"
                 style="margin-top:20px;">
        </div>
    `;
});

</script>

</body>
</html>
